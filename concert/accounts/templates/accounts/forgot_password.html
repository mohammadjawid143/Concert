{% extends "ticketSales/layout.html" %}

{% block title %} Forgot Password {% endblock %}

{% block main %}

    <div class="bgcolor">
        {% include "webapp/header.html" %}

        <div class="container-login100">
            <div class="wrap-login100">
                <form class="login100-form validate-form" method="POST">

                    <span class="login100-form-title p-b-26">
                        Forgot Password
                    </span>

                    {% csrf_token %}
                    <p style="color: red;">{{ errorMessage }}</p>
                    <div class="wrap-input100 validate-input" data-validate="Enter your email">
                        <i class="fa fa-envelope input-icon"></i> <!-- Font Awesome envelope icon -->
                        <input class="input100" type="email" name="email" autocomplete="off" required>
                        <span class="focus-input100" data-placeholder="Email"></span>
                    </div>

                    <div class="container-login100-form-btn">
                        <div class="wrap-login100-form-btn">
                            <div class="login100-form-bgbtn"></div>
                            <button class="login100-form-btn" type="submit">
                                Reset Password
                            </button>
                        </div>
                    </div>

                    <div class="text-center p-t-115">
                        <span class="txt1">
                            Remembered your password?
                        </span>
                        <a class="txt2" href="{% url 'login' %}">
                            Login
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>

{% endblock %}
